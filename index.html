<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Terminal System V7.0</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-blue: #00f3ff;
            --neon-yellow: #ffeb3b;
            --neon-red: #ff3333;
            --dark-bg: #050505;
            --glass-bg: rgba(10, 15, 20, 0.7);
            --glass-border: rgba(0, 243, 255, 0.15);
        }

        body {
            margin: 0; padding: 0; background-color: var(--dark-bg); color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9); width: 450px; display: none;
            position: relative; max-height: 90vh; overflow-y: auto; animation: bootUp 0.4s ease-out forwards;
        }

        @keyframes bootUp {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .terminal-panel {
            width: 85%; max-width: 900px; height: 70vh; border: 1px solid rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1); padding: 30px; display: none;
            flex-direction: column; background: rgba(5, 10, 5, 0.95); border-radius: 12px;
        }

        h2 { text-align: center; margin-bottom: 20px; font-family: 'Arial', sans-serif; letter-spacing: 3px; text-transform: uppercase; font-weight: 900; }
        .neon-text { color: var(--neon-green); text-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        .admin-text { color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }

        input, select, button {
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: none;
            box-sizing: border-box; outline: none; font-weight: bold; font-family: 'Courier New', Courier, monospace;
        }

        input, select { background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid rgba(255, 255, 255, 0.15); transition: 0.2s; }
        input:focus, select:focus { border-color: var(--neon-blue); box-shadow: 0 0 12px rgba(0, 243, 255, 0.3); }

        button { background: linear-gradient(90deg, #0f2027, #203a43, #2c5364); color: white; cursor: pointer; text-transform: uppercase; border: 1px solid rgba(255, 255, 255, 0.1); }
        button:hover { box-shadow: 0 0 15px var(--neon-blue); transform: translateY(-1px); }

        #terminal-output { flex-grow: 1; overflow-y: auto; margin-top: 20px; border-top: 1px solid rgba(0, 255, 65, 0.2); padding-top: 15px; white-space: pre-wrap; line-height: 1.6; }

        #login-screen { display: block; }
        #upload-section, #viewer-section, #user-management-section { display: none; margin-top: 15px; border-top: 1px solid var(--glass-border); padding-top: 15px; }

        .nav-btn { background: rgba(0, 243, 255, 0.05); border-color: rgba(0, 243, 255, 0.3); color: var(--neon-blue); padding: 10px; margin: 4px 0; font-size: 12px; }
        .db-item { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 243, 255, 0.2); padding: 10px; margin-bottom: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        
        .action-buttons { display: flex; gap: 6px; }
        .action-buttons button { width: auto; padding: 4px 10px; margin: 0; font-size: 10px; background: transparent; }
        .btn-edit { border: 1px solid var(--neon-yellow); color: var(--neon-yellow); }
        .btn-del { border: 1px solid var(--neon-red); color: var(--neon-red); }

        .progress-container { width: 100%; height: 5px; background: rgba(255, 255, 255, 0.05); border-radius: 3px; margin-top: 20px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); transition: width 0.1s linear; }
        #boot-log { font-size: 12px; color: #888; margin-top: 15px; height: 110px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
        .cursor::after { content: '█'; animation: blink 1s step-start infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <!-- 1. AUTH GATEWAY -->
    <div id="login-screen" class="glass-panel">
        <h2>AUTH_GATEWAY</h2>
        <input type="text" id="username" placeholder="OPERATOR ID" autocomplete="off">
        <input type="password" id="password" placeholder="PASSKEY">
        <button onclick="handleLogin()">AUTHENTICATE</button>
        <p id="login-msg" style="color: var(--neon-red); text-align: center; font-size: 13px; margin-top: 15px; font-weight: bold;"></p>
    </div>

    <!-- 2. HIGH-END INITIALIZATION CONTAINER -->
    <div id="welcome-screen" class="glass-panel">
        <h2 id="welcome-title" class="neon-text">AUTHORIZATION VALID</h2>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="boot-log"></div>
    </div>

    <!-- 3. ADMIN PANEL COCKPIT -->
    <div id="admin-screen" class="glass-panel" style="width: 500px;">
        <h2 class="admin-text">SYS_ADMIN CONSOLE</h2>
        
        <button class="nav-btn" onclick="toggleSection('upload-section')">[+] TOGGLE INJECTION PORTAL</button>
        <button class="nav-btn" onclick="toggleSection('viewer-section')">[+] VIEW SECURED DATABANKS</button>
        <button class="nav-btn" onclick="toggleSection('user-management-section')" style="color: var(--neon-yellow); border-color: var(--neon-yellow);">[+] DIRECTORY USER MANAGEMENT</button>
        
        <!-- UPLOAD SECTION -->
        <div id="upload-section">
            <input type="text" id="target-id" placeholder="Target ID (@username)">
            <input type="text" id="target-name" placeholder="Full Name">
            <input type="text" id="target-address" placeholder="Address Data">
            <input type="text" id="target-cnic" placeholder="Identification Number">
            <input type="text" id="target-mobile" placeholder="Primary Mobile Number">
            <select id="target-network">
                <option value="" disabled selected>Select Network Provider...</option>
                <option value="Jazz / Mobilink">Jazz / Mobilink</option>
                <option value="Zong / CMPak">Zong / CMPak</option>
                <option value="Telenor Pakistan">Telenor Pakistan</option>
                <option value="Ufone">Ufone</option>
                <option value="SCOM">SCOM</option>
            </select>
            <input type="text" id="target-other-number" placeholder="Alternate Number (Optional)">
            <button id="inject-btn" onclick="uploadData()" style="color: var(--neon-blue); border-color: var(--neon-blue);">ENCRYPT & INJECT</button>
            <p id="admin-msg" style="color: var(--neon-green); text-align: center; font-size: 12px; margin-top: 10px;"></p>
        </div>

        <!-- VIEWER SECTION -->
        <div id="viewer-section">
            <div id="database-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 10px;"></div>
            <button onclick="clearAllData()" style="color: var(--neon-red); border-color: var(--neon-red);">[!] PURGE ALL RECORDS</button>
        </div>

        <!-- DYNAMIC USER MANAGEMENT SECTION -->
        <div id="user-management-section">
            <h3 style="font-size: 13px; color: var(--neon-yellow); text-align: center; margin-bottom: 10px;">PROVISION / UPDATE OPERATIONS ACCESS</h3>
            <input type="hidden" id="manage-user-id">
            <input type="text" id="manage-username" placeholder="Assign Account Username">
            <input type="text" id="manage-password" placeholder="Assign Account Password">
            <select id="manage-role">
                <option value="User">User Clearance Mode</option>
                <option value="Admin">Admin Override Mode</option>
            </select>
            <button onclick="submitUserConfiguration()" style="background: rgba(255, 235, 59, 0.1); border-color: var(--neon-yellow); color: var(--neon-yellow);">COMMIT USER CONFIG</button>
            <div id="user-registry-list" style="max-height: 180px; overflow-y: auto; margin-top: 15px;"></div>
        </div>

        <button onclick="logout()" style="color: var(--neon-red); border-color: var(--neon-red); margin-top: 20px;">CLOSE SESSION</button>
    </div>

    <!-- 4. OPERATOR QUERY WORKSPACE -->
    <div id="terminal-screen" class="terminal-panel">
        <h2 class="neon-text">OSINT QUERY TERMINAL V7.0</h2>
        <div style="display: flex; gap: 15px;">
            <input type="text" id="search-id" placeholder="Enter Target ID to scan database...">
            <button onclick="startSearch()" style="width: 180px; font-size: 16px;">EXECUTE</button>
        </div>
        <div id="terminal-output" class="neon-text cursor">System Online. Connected to backend pipeline. Awaiting prompt...</div>
        <button onclick="logout()" style="margin-top: 15px; border-color: var(--neon-red); color: var(--neon-red); background: rgba(255,51,51,0.05); width: 200px; align-self: flex-end;">DISCONNECT</button>
    </div>

    <script>
        // --- LIVE SUPABASE INTEGRATION MATRIX ---
        const SUPABASE_URL = 'https://adqiprobgmyzsxrwrjdo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcWlwcm9iZ215enN4cndyamRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4ODc5NDYsImV4cCI6MjA5ODQ2Mzk0Nn0.G8gEWElZs6eftJ4sRWCDx6fhyEX_icutmIPMWcQnefQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- ASYNCHRONOUS AUTH CHECK OVER LIVE DATA ---
        async function handleLogin() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value.trim();
            const msg = document.getElementById('login-msg');
            msg.innerText = "";

            if(!userIn || !passIn) { msg.innerText = ">> ERR: ACCESS DISALLOWED <<"; return; }

            const { data, error } = await supabase.from('system_users').select('*').eq('username', userIn).eq('password', passIn);

            if(error || !data || data.length === 0) {
                msg.innerText = ">> ERR: UNVERIFIED CREDENTIALS <<";
                return;
            }

            const activeAccount = data[0];
            if(activeAccount.status === 'Inactive') { msg.innerText = ">> ERR: CREDENTIALS DEACTIVATED <<"; return; }

            runBootSequence(activeAccount.role.toLowerCase(), activeAccount.role === 'Admin' ? 'ADMIN OVERRIDE' : 'ACCESS GRANTED');
        }

        function runBootSequence(role, titleText) {
            document.getElementById('login-screen').style.display = 'none';
            const titleEl = document.getElementById('welcome-title');
            titleEl.innerText = titleText;
            titleEl.className = role === 'admin' ? 'admin-text' : 'neon-text';
            document.getElementById('welcome-screen').style.display = 'block';

            const bootLog = document.getElementById('boot-log');
            const progressBar = document.getElementById('progress-bar');
            progressBar.style.backgroundColor = role === 'admin' ? 'var(--neon-blue)' : 'var(--neon-green)';
            bootLog.innerHTML = ""; progressBar.style.width = "0%";

            const steps = ["Linking secure framework arrays...", "Validating global proxy channels...", "Handshaking with Supabase Cloud Databank...", "Mapping secure interface elements...", "Core sequence authenticated."];
            let step = 0, progress = 0;

            const bInt = setInterval(() => { progress += 4; progressBar.style.width = progress + "%"; if(progress >= 100) clearInterval(bInt); }, 40);
            const tInt = setInterval(() => {
                if(step < steps.length) { bootLog.innerHTML += `<div>> ${steps[step]}</div>`; step++; } 
                else { clearInterval(tInt); setTimeout(() => finishBoot(role), 400); }
            }, 300);
        }

        function finishBoot(role) {
            document.getElementById('welcome-screen').style.display = 'none';
            if (role === 'admin') {
                document.getElementById('admin-screen').style.display = 'block';
                renderUserRegistry();
            } else {
                document.getElementById('terminal-screen').style.display = 'flex';
                document.getElementById('search-id').focus();
            }
        }

        function toggleSection(id) {
            const s = document.getElementById(id);
            s.style.display = (s.style.display === 'none' || s.style.display === '') ? 'block' : 'none';
            if(id === 'viewer-section' && s.style.display === 'block') renderDatabase();
        }

        // --- ADMIN COCKPIT OPERATIONS MANAGEMENT ---
        async function renderUserRegistry() {
            const listContainer = document.getElementById('user-registry-list');
            listContainer.innerHTML = '<p style="color: var(--neon-blue); font-size:11px;">Pulling user matrix...</p>';

            const { data, error } = await supabase.from('system_users').select('*').order('username', { ascending: true });
            if(error || !data) { listContainer.innerHTML = ''; return; }

            listContainer.innerHTML = '';
            data.forEach(user => {
                const item = document.createElement('div');
                item.className = 'db-item';
                item.innerHTML = `
                    <div><strong>${user.username}</strong> [${user.role}]<br><span style="color:#888; font-size:10px;">Pass: ${user.password}</span></div>
                    <div class="action-buttons">
                        <button class="btn-edit" onclick="populateUserEdit('${user.id}', '${user.username}', '${user.password}', '${user.role}')">EDIT</button>
                        <button class="btn-del" onclick="purgeUserAccess('${user.id}')">REMOVE</button>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        function populateUserEdit(id, username, password, role) {
            document.getElementById('manage-user-id').value = id;
            document.getElementById('manage-username').value = username;
            document.getElementById('manage-password').value = password;
            document.getElementById('manage-role').value = role;
        }

        async function submitUserConfiguration() {
            const id = document.getElementById('manage-user-id').value;
            const username = document.getElementById('manage-username').value.trim();
            const password = document.getElementById('manage-password').value.trim();
            const role = document.getElementById('manage-role').value;

            if(!username || !password) { alert('Fields cannot remain unassigned.'); return; }

            const userPayload = { username, password, role };

            if(id) {
                await supabase.from('system_users').update(userPayload).eq('id', id);
            } else {
                await supabase.from('system_users').insert([userPayload]);
            }

            document.getElementById('manage-user-id').value = '';
            document.getElementById('manage-username').value = '';
            document.getElementById('manage-password').value = '';
            renderUserRegistry();
        }

        async function purgeUserAccess(id) {
            if(confirm('Revoke and purge this operator profile?')) {
                await supabase.from('system_users').delete().eq('id', id);
                renderUserRegistry();
            }
        }

        // --- TARGET INJECTION AND CORE PIPELINES ---
        async function uploadData() {
            const id = document.getElementById('target-id').value.trim();
            const msg = document.getElementById('admin-msg');
            if(!id) { msg.style.color = 'var(--neon-red)'; msg.innerText = ">> TARGET ID REQUIRED <<"; return; }

            const payload = {
                target_id: id,
                name: document.getElementById('target-name').value || "DATA_MISSING",
                address: document.getElementById('target-address').value || "DATA_MISSING",
                cnic: document.getElementById('target-cnic').value || "DATA_MISSING",
                mobile: document.getElementById('target-mobile').value || "DATA_MISSING",
                network: document.getElementById('target-network').value || "UNKNOWN",
                other_number: document.getElementById('target-other-number').value || "NONE",
                last_updated: new Date().toISOString()
            };

            const { error } = await supabase.from('osint_records').upsert(payload);
            if(error) { msg.style.color = 'var(--neon-red)'; msg.innerText = ">> DATA WRITE FAILED <<"; }
            else { msg.style.color = 'var(--neon-green)'; msg.innerText = ">> PAYLOAD INJECTED SUCCESSFULLY <<"; resetPortalFields(); }
        }

        function resetPortalFields() {
            document.querySelectorAll('#upload-section input').forEach(el => el.value = '');
            document.getElementById('target-network').selectedIndex = 0;
            if(document.getElementById('viewer-section').style.display === 'block') renderDatabase();
        }

        async function renderDatabase() {
            const target = document.getElementById('database-list');
            target.innerHTML = '';
            const { data } = await supabase.from('osint_records').select('*').order('last_updated', { ascending: false });
            if(!data || data.length === 0) { target.innerHTML = '<p style="color:#555; text-align:center;">No payload detected.</p>'; return; }
            data.forEach(row => {
                const item = document.createElement('div');
                item.className = 'db-item';
                item.innerHTML = `
                    <div><strong>${row.target_id}</strong><br><span style="color:#ccc;">${row.name}</span></div>
                    <div class="action-buttons">
                        <button class="btn-edit" onclick="grabRecordForModification('${row.target_id}')">EDIT</button>
                        <button class="btn-del" onclick="purgeRecord('${row.target_id}')">DEL</button>
                    </div>
                `;
                target.appendChild(item);
            });
        }

        async function grabRecordForModification(id) {
            const { data } = await supabase.from('osint_records').select('*').eq('target_id', id).single();
            if(!data) return;
            document.getElementById('upload-section').style.display = 'block';
            document.getElementById('target-id').value = data.target_id;
            document.getElementById('target-name').value = data.name;
            document.getElementById('target-address').value = data.address;
            document.getElementById('target-cnic').value = data.cnic;
            document.getElementById('target-mobile').value = data.mobile;
            document.getElementById('target-network').value = data.network;
            document.getElementById('target-other-number').value = data.other_number;
        }

        async function purgeRecord(id) { if(confirm('Delete record?')) { await supabase.from('osint_records').delete().eq('target_id', id); renderDatabase(); } }
        async function clearAllData() { if(confirm('Purge entire active record databank?')) { await supabase.from('osint_records').delete().neq('target_id', 'CATCH_ALL'); renderDatabase(); } }

        // --- ENDPOINT SCANNER QUERIES ---
        async function startSearch() {
            const id = document.getElementById('search-id').value.trim();
            const output = document.getElementById('terminal-output');
            if(!id) return;

            output.innerHTML += `\n> CONNECTING TO SUPABASE NETWORK TO LOCATE PATHWAY [${id}]...\n`;
            const { data, error } = await supabase.from('osint_records').select('*').or(`target_id.ilike.%${id}%,mobile.eq.${id}`).limit(1);
            
            setTimeout(() => {
                if(error || !data || data.length === 0) {
                    output.innerHTML += `> ERR: SYSTEM DETECTED NO DATA ENTRIES FOR DIRECTIVE [${id}].\n`;
                } else {
                    const matched = data[0];
                    output.innerHTML += `\n+------------------------------------------------+\n`;
                    output.innerHTML += `| OPERATIONAL DATA ACQUIRED SUCCESS               |\n`;
                    output.innerHTML += `+------------------------------------------------+\n`;
                    output.innerHTML += `  ID      : ${matched.target_id}\n`;
                    output.innerHTML += `  NAME    : ${matched.name}\n`;
                    output.innerHTML += `  ADDRESS : ${matched.address}\n`;
                    output.innerHTML += `  CNIC    : ${matched.cnic}\n`;
                    output.innerHTML += `  MOBILE  : ${matched.mobile} [${matched.network}]\n`;
                    output.innerHTML += `  ALT NUM : ${matched.other_number}\n`;
                    output.innerHTML += `+------------------------------------------------+\n`;
                }
                output.scrollTop = output.scrollHeight;
            }, 1000);
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
